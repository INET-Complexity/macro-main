name: Build and test package

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.11" ]

    steps:

      - name: Install SSH Key
        uses: webfactory/ssh-agent@v0.5.2
        with:
          ssh-private-key: ${{ secrets.PRIVATE_SSH }}

      - name: Checkout inet-macro-model repository
        uses: actions/checkout@v2

      - name: Checkout inet-macro-data repository
        uses: actions/checkout@v2
        with:
          repository: INET-Complexity/inet-macro-data
          ssh-key: ${{ secrets.PRIVATE_SSH }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v1
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install package
        run: python setup.py install

      - name: Lint with black
        run: |
          pip install black
          black --check .

      - name: Test with pytest
        run: |
          pytest --cov=data test_inet_data --cov-report xml
