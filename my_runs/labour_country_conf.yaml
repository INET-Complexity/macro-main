forecasting_window: 60
government_entities:
  functions:
    consumption:
      name: AutoregressiveGovernmentConsumptionSetter
      parameters:
        consistency: 1.0
      path_name: consumption
households:
  functions:
    consumption:
      name: DefaultHouseholdConsumption
      parameters:
        consumption_smoothing_fraction: 0.0
        consumption_smoothing_window: 12
        minimum_consumption_fraction: 1.0
      path_name: consumption
    financial_assets:
      name: DefaultFinancialAssets
      parameters:
        income_from_fa_noise_std: 0.0
      path_name: financial_assets
    insolvency:
      name: DefaultHouseholdInsolvencyHandler
      parameters: {}
      path_name: insolvency
    investment:
      name: DefaultHouseholdInvestment
      parameters: {}
      path_name: investment
    property:
      name: DefaultHouseholdDemandForProperty
      parameters:
        cost_comparison_temperature: 1.0
        maximum_price_income_coefficient: 5.0
        maximum_price_income_exponent: 1.0
        maximum_price_noise_mean: 0.0
        maximum_price_noise_variance: 0.0
        maximum_rent_income_coefficient: 0.2
        maximum_rent_income_exponent: 0.0
        partial_rent_inflation_delay: 1
        partial_rent_inflation_indexation: 0.0
        price_decrease_mean: 0.0
        price_decrease_probability: 0.0
        price_decrease_variance: 0.0
        price_initial_markup: 0.0
        probability_stay_in_owned_property: 0.5
        probability_stay_in_rented_property: 0.5
        psychological_pressure_of_renting: 0.1
        rent_decrease_mean: 0.0
        rent_decrease_probability: 0.0
        rent_decrease_variance: 0.0
        rent_initial_markup: 0.0
      path_name: property
    rent:
      name: ConstantRentSetter
      parameters:
        new_property_rent_markup: 0.1
        offered_rent_decrease: 0.03
        partial_rent_inflation_indexation: 0.0
      path_name: rent
    saving_rates:
      name: AverageSavingRatesSetter
      parameters:
        independents:
        - Income
        - Debt
      path_name: saving_rates
    social_transfers:
      name: EqualSocialTransfersSetter
      parameters:
        independents:
        - Income
        - Debt
      path_name: social_transfers
    target_credit:
      name: DefaultHouseholdTargetCredit
