        debtor_minimum_fill: 0.0
        firms_max_number_of_banks_visiting: 5
        households_max_number_of_banks_visiting: 5
        interest_rates_selection_temperature: 0.0
      path_name: clearing
economy:
  functions:
    growth:
      name: GrowthManualForecastingAutoReg
