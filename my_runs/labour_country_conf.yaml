      name: DefaultSocialHousing
      parameters:
        rent_as_fraction_of_unemployment_rate: 0.25
      path_name: social_housing
credit_market:
  functions:
    clearing:
      name: WaterBucketCreditMarketClearer
      parameters:
        allow_household_loans: true
        allow_short_term_firm_loans: true
        consider_loan_type_fractions: true
        credit_supply_temperature: 0.0
        creditor_minimum_fill: 0.0
