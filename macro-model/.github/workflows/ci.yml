name: Build and test package (Macrocosm)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]

    steps:

      - name: Install SSH Key
        uses: webfactory/ssh-agent@v0.5.2
        with:
          ssh-private-key: ${{ secrets.PRIVATE_SSH }}

      - uses : actions/checkout@v2

      - name: Checkout macrocosm macro-data repository
        uses: actions/checkout@v2
        with:
          repository: macro-cosm/macrocosm-macro-data
          ssh-key: ${{ secrets.PRIVATE_SSH }}
          path: ./macro-data


      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v1
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ./macro-data/
          pip install -r requirements.txt

      - name: Install package
        run: python setup.py install

      - name: Lint with black
        run: |
          pip install black
          black --check ./macromodel
          black --check ./test_macromodel

      - name: Test with pytest
        run: |
          pytest --cov=model test_macromodel --cov-report xml
